name: Java CI

on:
  push:
    branches: [master, v3-openhtmltopdf]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Maven Central'
        type: boolean
        default: false
      luceeVersions:
        description: 'JSON array of Lucee versions to test'
        required: false
        default: '[ "7.1/snapshot/light" ]'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.extract-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Extract version number
        id: extract-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build extension
        run: mvn -B -e clean verify

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pdf-lex
          path: target/*.lex

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    strategy:
      fail-fast: false
      matrix:
        lucee: ${{ fromJSON(inputs.luceeVersions || '["7.1/snapshot/light"]') }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Cache Lucee files
        uses: actions/cache@v5
        with:
          path: ~/work/_actions/lucee/script-runner/main/lucee-download-cache
          key: lucee-downloads

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          name: pdf-lex
          path: target

      - name: Checkout Lucee
        uses: actions/checkout@v6
        with:
          repository: lucee/lucee
          path: lucee

      - name: Run Lucee Test Suite
        uses: lucee/script-runner@main
        with:
          webroot: ${{ github.workspace }}/lucee/test
          execute: /bootstrap-tests.cfm
          luceeVersion: ${{ matrix.lucee }}
          extensionDir: ${{ github.workspace }}/target
          extensions: B737ABC4-D43F-4D91-8E8E973E37C40D1B # image extension
        env:
          testLabels: pdf
          testAdditional: ${{ github.workspace }}/tests

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('pom.xml') }}
          restore-keys: maven-

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and Deploy with Maven
        env:
          VERSION: ${{ needs.build.outputs.version }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "------- Maven Deploy snapshot -------";
            mvn -B -e clean deploy --settings maven-settings.xml
          else
            echo "------- Maven Deploy release -------";
            mvn -B -e clean deploy -DperformRelease=true --settings maven-settings.xml
          fi
